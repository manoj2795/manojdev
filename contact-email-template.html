<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Portfolio Inquiry</title>
    <style>
        /* Modern Email Template Styles aligned with index.html dark theme */
        body {
            font-family: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #0d1117;
            color: #f0f6fc;
            margin: 0;
            padding: 40px 20px;
            -webkit-font-smoothing: antialiased;
        }
        
        table {
            border-spacing: 0;
            border-collapse: collapse;
        }

        .email-wrapper {
            width: 100%;
            background-color: #0d1117;
            padding: 40px 0;
        }

        .email-container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        .header {
            background-color: #58a6ff;
            /* Fallback to solid color, but use gradient where supported */
            background-image: linear-gradient(135deg, #58a6ff 0%, #a371f7 100%);
            padding: 35px 40px;
            text-align: center;
        }

        .header h1 {
            color: #ffffff;
            margin: 0;
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .content {
            padding: 40px;
        }

        .info-block {
            margin-bottom: 24px;
        }

        .label {
            font-size: 12px;
            color: #58a6ff;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .value {
            font-size: 16px;
            color: #f0f6fc;
            font-weight: 400;
            line-height: 1.6;
            padding-bottom: 16px;
            border-bottom: 1px solid #30363d;
        }

        .value a {
            color: #58a6ff;
            text-decoration: none;
            transition: color 0.3s;
        }

        .value a:hover {
            color: #a371f7;
        }

        .value-no-border {
            border-bottom: none;
            padding-bottom: 0;
        }

        .message-box {
            background-color: #0d1117;
            border-left: 4px solid #a371f7;
            border-radius: 0 12px 12px 0;
            padding: 24px;
            margin-top: 12px;
            color: #c9d1d9;
            font-size: 15px;
            line-height: 1.7;
            white-space: pre-wrap;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }

        .action-button {
            display: inline-block;
            background-color: #58a6ff;
            background-image: linear-gradient(135deg, #58a6ff 0%, #a371f7 100%);
            color: #ffffff !important;
            text-decoration: none;
            font-weight: 600;
            padding: 14px 32px;
            border-radius: 50px;
            margin-top: 35px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(88, 166, 255, 0.3);
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        .footer {
            padding: 25px 40px 35px;
            text-align: center;
            background-color: #161b22;
            border-top: 1px solid #30363d;
        }

        .footer p {
            margin: 0;
            font-size: 13px;
            color: #8b949e;
        }

        .timestamp {
            display: inline-block;
            background-color: rgba(88, 166, 255, 0.1);
            color: #58a6ff;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 11px;
            margin-top: 12px;
            font-weight: 600;
            border: 1px solid rgba(88, 166, 255, 0.2);
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body style="background-color: #0d1117; color: #f0f6fc; font-family: 'Inter', Helvetica, sans-serif;">
    <table class="email-wrapper" width="100%" cellpadding="0" cellspacing="0" role="presentation" style="background-color: #0d1117;">
        <tr>
            <td align="center" style="padding: 40px 20px;">
                <table class="email-container" width="100%" cellpadding="0" cellspacing="0" role="presentation" style="max-width: 600px; background-color: #161b22; border: 1px solid #30363d; border-radius: 20px;">
                    <!-- Header -->
                    <tr>
                        <td class="header" style="background: #58a6ff; background: linear-gradient(135deg, #58a6ff 0%, #a371f7 100%); padding: 35px 40px; text-align: center;">
                            <h1 style="color: #ffffff; margin: 0; font-size: 26px; font-weight: 800; letter-spacing: -0.02em;">New Portfolio Inquiry</h1>
                        </td>
                    </tr>
                    
                    <!-- Main Content -->
                    <tr>
                        <td class="content" style="padding: 40px;">
                            <!-- Sender Name -->
                            <div class="info-block" style="margin-bottom: 24px;">
                                <div class="label" style="font-size: 12px; color: #58a6ff; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700; margin-bottom: 8px;">From</div>
                                <div class="value" style="font-size: 16px; color: #f0f6fc; padding-bottom: 16px; border-bottom: 1px solid #30363d;">
                                    <strong>{{user_name}}</strong>
                                </div>
                            </div>
                            
                            <!-- Sender Email -->
                            <div class="info-block" style="margin-bottom: 24px;">
                                <div class="label" style="font-size: 12px; color: #58a6ff; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700; margin-bottom: 8px;">Email Address</div>
                                <div class="value" style="font-size: 16px; color: #f0f6fc; padding-bottom: 16px; border-bottom: 1px solid #30363d;">
                                    <a href="mailto:{{user_email}}" style="color: #58a6ff; text-decoration: none;">{{user_email}}</a>
                                </div>
                            </div>
                            
                            <!-- Subject -->
                            <div class="info-block" style="margin-bottom: 24px;">
                                <div class="label" style="font-size: 12px; color: #58a6ff; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700; margin-bottom: 8px;">Subject</div>
                                <div class="value" style="font-size: 16px; color: #f0f6fc; padding-bottom: 16px; border-bottom: 1px solid #30363d;">
                                    {{subject}}
                                </div>
                            </div>
                            
                            <!-- Message -->
                            <div class="info-block" style="margin-bottom: 0;">
                                <div class="label" style="font-size: 12px; color: #58a6ff; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700; margin-bottom: 8px;">Message details</div>
                                <div class="value value-no-border" style="border: none; padding-bottom: 0;">
                                    <div class="message-box" style="background-color: #0d1117; border-left: 4px solid #a371f7; border-radius: 0 12px 12px 0; padding: 24px; margin-top: 12px; color: #c9d1d9; font-size: 15px; line-height: 1.7; white-space: pre-wrap;">{{message}}</div>
                                </div>
                            </div>

                            <!-- Reply Button -->
                            <table width="100%" cellpadding="0" cellspacing="0" role="presentation">
                                <tr>
                                    <td align="center" style="padding-top: 10px;">
                                        <a href="mailto:{{user_email}}?subject=Re: {{subject}}" class="action-button" style="display: inline-block; background-color: #58a6ff; color: #ffffff; text-decoration: none; font-weight: 600; padding: 14px 32px; border-radius: 50px; margin-top: 35px; text-transform: uppercase; font-size: 14px; letter-spacing: 0.5px;">
                                            Reply to {{user_name}}
                                        </a>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                    
                    <!-- Footer -->
                    <tr>
                        <td class="footer" style="padding: 25px 40px 35px; text-align: center; background-color: #161b22; border-top: 1px solid #30363d;">
                            <p style="margin: 0; font-size: 13px; color: #8b949e;">Sent securely via your Portfolio Contact Form</p>
                            <div class="timestamp" style="display: inline-block; color: #58a6ff; padding: 6px 16px; border-radius: 20px; font-size: 11px; margin-top: 12px; font-weight: 600; border: 1px solid #30363d; letter-spacing: 0.5px;">
                                Received: {{date_time}}
                            </div>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
